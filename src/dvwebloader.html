<!DOCTYPE html>
<html lang='en'>
    <head>
        <title>Dataverse WebLoader</title>
        <link type="text/css" rel="stylesheet" href="css/dvwebloader.css">
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/core.js"></script>
        <script type="module" src="js/fileupload2.js"></script>
        <script src="js/logoHandler.js"></script>

    </head>
    <body>
        <main>
            <div>
                <img id='logo' alt='Site Logo'>
                <h1><span id="title-text">Folder Upload</span></h1>
                <div id='help'>
                    <a href='https://github.com/gdcc/dvwebloader/wiki' target='_blank'><span id="help-tutorial-text">Help/Tutorial</span></a>
                </div>
            </div>
            <hr class='solid'>

            <div id="top">
                <div id='button-container' class='button-flex-container'>
                    <div class='button-left'>
                        <label for='files' class='button'><span id="select-dir-text">Select a Directory</span><input type="file" id="files" name="files[]" multiple webkitdirectory style="display: none" /></label>
                    </div>
                    <div class='button-right'>
                    </div>
                </div>
                <div id='messages'></div>
                <div id='content-warnings'></div>
                <div id="pending-spinner" class="pending" style="display: none;">
                    <div class="spinner"></div>
                    <span id="pending-text"></span>
                </div>
            </div>
            <div id="filelist"></div>
            <div id="credit">
                <a href='https://github.com/gdcc/dvwebloader' target='_blank'>DVWebloader v0.5</a><span id="sponsor-text">, development sponsored by UiT/DataverseNO</span>
            </div>
        </main>
    </body>
</html>
